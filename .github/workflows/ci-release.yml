name: CI And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run package:vsix

      - name: Build Release Notes From CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
          BEGIN { capture = 0 }
          $0 ~ "^## \\[" version "\\]" { capture = 1 }
          capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
          capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## [${VERSION}] - ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "- 无可用变更说明（请检查 CHANGELOG.md 是否包含该版本段落）。" >> RELEASE_NOTES.md
          fi

      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        with:
          files: smart-git-committer-*.vsix
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
